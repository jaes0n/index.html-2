<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>간단 POS</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.pos{
    background:white;
    width:350px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:black;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

ul{
    margin-top:20px;
    padding-left:20px;
}

.total{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
    text-align:center;
}

#suggestions{
    margin-top:10px;
}

.suggestion-item{
    padding:10px;
    background:#eee;
    margin-top:5px;
    border-radius:8px;
    cursor:pointer;
}

.suggestion-item:hover{
    background:#ddd;
}

</style>
</head>

<body>

<div class="pos">
    <h1>간단 POS</h1>

    <input type="text" id="item" placeholder="메뉴 입력">

    <div id="suggestions"></div>

    <button onclick="addItem()">추가</button>

    <button onclick="resetList()">초기화</button>

    <ul id="list"></ul>

    <div class="total">
        총 금액: <span id="total">0</span>원
    </div>
</div>

    "파인사과 주스": 5400,
    "수박 주스": 5400,
    "메론 라떼": 4400

};

let total = 0;

function addItem(){

    const item =
    document.getElementById("item").value.trim();

    if(menu[item] === undefined){
        alert("등록되지 않은 메뉴입니다");
        return;
    }

    const price = menu[item];

    const li = document.createElement("li");

    li.textContent =
    item + " - " + price.toLocaleString() + "원";

    document.getElementById("list")
    .appendChild(li);

    total += price;

    document.getElementById("total")
    .textContent = total.toLocaleString();

    document.getElementById("item").value = "";

}

function resetList(){

    document.getElementById("list").innerHTML = "";

    total = 0;

    document.getElementById("total")
    .textContent = "0";

}

</script>

</body>
</html>
