<!DOCTYPE html><html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>간단 POS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }.pos {
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 8px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  background: #222;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 5px;
}

button:hover {
  background: #444;
}

.total {
  margin-top: 20px;
  font-size: 24px;
  font-weight: bold;
  text-align: center;
}

ul {
  padding-left: 20px;
}

  </style>
</head>

  <body>
  <div class="pos">
    <h1>간단 POS</h1>

    <input type="text" id="item" placeholder="메뉴 입력" />

    <button onclick="addItem()">추가</button>
    <button onclick="resetList()">초기화</button>

    <ul id="list"></ul>

    <div class="total">
      총 금액: <span id="total">0</span>원
    </div>
  </div>

  <script>
    const menu = {
      "아메리카노": 3000,
      "카페라떼": 4500,
      "바닐라라떼": 5000,
      "아이스티": 3500
    };

    let total = 0;

    function addItem() {
      const item =
        document.getElementById('item').value.trim();

      if (!menu[item]) {
        alert('등록되지 않은 메뉴입니다');
        return;
      }

      const price = menu[item];

      const li = document.createElement('li');

      li.textContent =
        `${item} - ${price.toLocaleString()}원`;

      document.getElementById('list')
        .appendChild(li);

      total += price;

      document.getElementById('total')
        .textContent = total.toLocaleString();

      document.getElementById('item').value = '';
    }

    function resetList() {
      document.getElementById('list').innerHTML = '';

      total = 0;

      document.getElementById('total')
        .textContent = '0';
    }
  </script>
  </body>
</html>
